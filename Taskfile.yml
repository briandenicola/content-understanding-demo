version: '3'

vars:
  TITLE: Content Understanding Demo
  DEFAULT_REGION: westus
  BACKEND_DIR: src/backend/ContentUnderstanding.Api
  FRONTEND_DIR: src/frontend
  INFRA_DIR: infrastructure

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  up:
    desc: Creates complete Azure environment for {{.TITLE}}
    cmds:
      - task: _init
      - task: apply

  apply:
    desc: Apply Terraform infrastructure
    cmds:
      - terraform -chdir=./{{.INFRA_DIR}} apply -auto-approve -compact-warnings
        -var "region={{.REGION}}"
    vars:
      REGION: '{{default .DEFAULT_REGION .CLI_ARGS}}'

  down:
    desc: Destroy all Azure resources and clean Terraform/build files
    cmds:
      - terraform -chdir=./{{.INFRA_DIR}} destroy -auto-approve || true
      - cmd: rm -rf .terraform .terraform.lock.hcl terraform.tfstate.d
        dir: '{{.INFRA_DIR}}'
      - dotnet clean {{.BACKEND_DIR}} || true
      - cmd: rm -rf node_modules dist
        dir: '{{.FRONTEND_DIR}}'

  build:
    desc: Build backend and frontend
    cmds:
      - task: _setup
      - dotnet build {{.BACKEND_DIR}}
      - npm run build --prefix {{.FRONTEND_DIR}}

  run:
    desc: Run backend and frontend locally
    deps:
      - _run:backend
      - _run:frontend

  test:
    desc: Run all tests
    cmds:
      - dotnet test src/backend

  clean:
    desc: Clean build artifacts
    cmds:
      - dotnet clean {{.BACKEND_DIR}}
      - cmd: rm -rf node_modules dist
        dir: '{{.FRONTEND_DIR}}'

  # === Internal tasks ===
  _init:
    internal: true
    cmds:
      - terraform -chdir=./{{.INFRA_DIR}} init -upgrade
      - terraform -chdir=./{{.INFRA_DIR}} workspace new {{.REGION}} || true
      - terraform -chdir=./{{.INFRA_DIR}} workspace select {{.REGION}}
    vars:
      REGION: '{{default .DEFAULT_REGION .CLI_ARGS}}'

  _setup:
    internal: true
    cmds:
      - dotnet restore {{.BACKEND_DIR}}
      - npm install --prefix {{.FRONTEND_DIR}}

  _run:backend:
    internal: true
    dir: '{{.BACKEND_DIR}}'
    vars:
      CUS_ENDPOINT:
        sh: terraform -chdir=../../infrastructure output -raw CONTENT_UNDERSTANDING_ENDPOINT 2>/dev/null || echo ""
      STORAGE_CONN:
        sh: terraform -chdir=../../infrastructure output -raw STORAGE_CONNECTION_STRING 2>/dev/null || echo ""
      FOUNDRY_ENDPOINT:
        sh: terraform -chdir=../../infrastructure output -raw FOUNDRY_PROJECT_ENDPOINT 2>/dev/null || echo ""
    env:
      Azure__ContentUnderstandingEndpoint: '{{.CUS_ENDPOINT}}'
      Azure__StorageConnectionString: '{{.STORAGE_CONN}}'
      Azure__FoundryProjectEndpoint: '{{.FOUNDRY_ENDPOINT}}'
    cmds:
      - dotnet watch run

  _run:frontend:
    internal: true
    dir: '{{.FRONTEND_DIR}}'
    cmds:
      - npm run dev
